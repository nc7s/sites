name: Deploy ncts.me

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'ncts.me/**'
      - '.github/workflows/deploy-ncts.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ncts.me
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run build

      - run: echo 'ncts.me' > _build/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ncts.me/_build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
